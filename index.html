```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puttikan Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        -45deg,
        #93c5fd,
        #60a5fa,
        #3b82f6,
        #2563eb
    );

    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

/* ใบไม้ */

.leaf{
    position:fixed;
    top:-50px;
    z-index:1;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{

    0%{
        transform:
        translateY(-100px)
        rotate(0deg);
        opacity:1;
    }

    100%{
        transform:
        translateY(120vh)
        rotate(720deg);
        opacity:.2;
    }
}

/* กล่อง */

.card{
    position:relative;
    z-index:100;

    width:90%;
    max-width:600px;

    padding:40px;

    text-align:center;

    background:rgba(255,255,255,.8);

    backdrop-filter:blur(15px);

    border-radius:30px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.2);

    animation:
    float 5s ease-in-out infinite;
}

@keyframes float{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-15px);
    }
}

.avatar{

    width:130px;
    height:130px;

    margin:auto;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:65px;

    background:#dbeafe;

    border:4px solid #2563eb;

    margin-bottom:20px;
}

h1{
    color:#1e3a8a;
    margin-bottom:15px;
}

p{
    color:#111827;
    font-size:18px;
    margin:12px 0;
    line-height:1.8;
}

.name{
    color:#2563eb;
    font-weight:bold;
}

.btn{
    margin-top:25px;

    padding:14px 30px;

    border:none;

    border-radius:50px;

    cursor:pointer;

    color:white;

    font-size:17px;

    background:linear-gradient(
        135deg,
        #2563eb,
        #60a5fa
    );

    transition:.3s;
}

.btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 8px 25px
    rgba(37,99,235,.4);
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.5);

    backdrop-filter:blur(5px);

    z-index:999;
}

.modal-content{

    width:90%;
    max-width:350px;

    background:white;

    padding:25px;

    border-radius:20px;

    text-align:center;

    margin:15% auto;

    animation:popup .3s ease;
}

@keyframes popup{

    from{
        opacity:0;
        transform:scale(.7);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.popup-btn{

    border:none;

    padding:10px 18px;

    border-radius:10px;

    margin:10px 5px;

    cursor:pointer;

    color:white;
}

.confirm{
    background:#22c55e;
}

.cancel{
    background:#ef4444;
}
</style>
</head>
<body>

<div class="card">

    <div class="avatar">
        🩺
    </div>

    <h1>ยินดีต้อนรับสู่โปรไฟล์ของผม</h1>

    <p>
        สวัสดีครับ ผมชื่อ
        <span class="name">
            พุฒิกันย์ (Puttikan)
        </span>
    </p>

    <p>
        🔬 สนใจด้าน Science & Medical
    </p>

    <p>
        📚 กำลังศึกษาและพัฒนาทักษะทางวิทยาศาสตร์และการแพทย์
    </p>

    <p>
        🚀 เว็บไซต์แรกของผมบน GitHub Pages
    </p>

    <button class="btn" onclick="openModal()">
        Explore My Profile
    </button>

</div>

<div id="myModal" class="modal">

    <div class="modal-content">

        <h2>📂 Portfolio</h2>

        <p>
            ต้องการเข้าสู่หน้าถัดไปหรือไม่?
        </p>

        <button
            class="popup-btn confirm"
            onclick="goNext()">
            ตกลง
        </button>

        <button
            class="popup-btn cancel"
            onclick="closeModal()">
            ยกเลิก
        </button>

    </div>

</div>

<script>

/* ใบไม้ร่วง */

function createLeaf(){

    const leaf =
    document.createElement("div");

    leaf.className = "leaf";

    leaf.innerHTML = "🍃";

    leaf.style.left =
    Math.random()*100 + "vw";

    leaf.style.fontSize =
    (15 + Math.random()*25) + "px";

    leaf.style.animationDuration =
    (6 + Math.random()*6) + "s";

    document.body.appendChild(leaf);

    setTimeout(()=>{
        leaf.remove();
    },12000);
}

setInterval(createLeaf,400);

/* Modal */

function openModal(){
    document.getElementById(
        "myModal"
    ).style.display="block";
}

function closeModal(){
    document.getElementById(
        "myModal"
    ).style.display="none";
}

function goNext(){

    /*
      เปลี่ยนเป็นชื่อไฟล์จริง
      เช่น about.html
      portfolio.html
    */

    window.location.href =
    "portfolio.html";
}

/* ปิดเมื่อคลิกพื้นหลัง */

window.onclick = function(event){

    let modal =
    document.getElementById(
        "myModal"
    );

    if(event.target == modal){
        modal.style.display =
        "none";
    }
}

</script>

</body>
</html>

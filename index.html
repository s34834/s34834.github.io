<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puttikan Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Background */

.background{
    position:fixed;
    inset:0;

    background:
    linear-gradient(
    rgba(255,255,255,.25),
    rgba(255,255,255,.25)
    ),
    url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");

    background-size:cover;
    background-position:center;

    z-index:-3;

    transition:transform .2s;
}

.overlay{
    position:fixed;
    inset:0;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(2px);

    z-index:-2;
}

/* Card */

.card{
    width:90%;
    max-width:650px;

    padding:45px;

    text-align:center;

    border-radius:30px;

    background:rgba(255,255,255,.22);

    border:1px solid rgba(255,255,255,.35);

    backdrop-filter:blur(20px);

    box-shadow:
    0 15px 40px rgba(0,0,0,.15);

    animation:float 5s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-15px);
    }
}

.avatar{
    width:140px;
    height:140px;

    margin:auto auto 25px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:70px;

    background:rgba(255,255,255,.4);

    border:4px solid #2563eb;
}

h1{
    color:#111827;
    margin-bottom:20px;
}

p{
    color:#111827;
    font-size:18px;
    line-height:1.9;
    margin:10px 0;
}

.name{
    color:#2563eb;
    font-weight:bold;
}

/* Leaves */

.leaf{
    position:fixed;
    top:-100px;

    pointer-events:none;
}

@keyframes leafFall{

    0%{
        transform:
        translate(0,-100px)
        rotate(0deg);
        opacity:1;
    }

    100%{
        transform:
        translate(-30px,120vh)
        rotate(720deg);

        opacity:.2;
    }
}

@media(max-width:768px){

    .card{
        padding:30px 20px;
    }

    .avatar{
        width:110px;
        height:110px;
        font-size:55px;
    }

    p{
        font-size:16px;
    }
}

</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="card">

    <div class="avatar">
        🌿
    </div>

    <h1>สวัสดีครับ</h1>

    <p>
        ผมชื่อ
        <span class="name">พุฒิกันย์ ฤๅไกรศรี</span>
    </p>

    <p>
        🔬 สนใจด้าน Science และ Medical
    </p>

    <p>
        🌱 รักธรรมชาติ และการเรียนรู้สิ่งใหม่
    </p>

    <p>
        💻 กำลังพัฒนาทักษะด้านเว็บไซต์และเทคโนโลยี
    </p>

    <p>
        🚀 ยินดีต้อนรับสู่ Portfolio ของผม
    </p>

</div>

<script>

/* Falling Leaves */

function createLeaf(){

    const leaf =
    document.createElement("div");

    leaf.classList.add("leaf");

    const leaves = [
        "🍃",
        "🍂",
        "🌿"
    ];

    leaf.innerHTML =
    leaves[
        Math.floor(
            Math.random() *
            leaves.length
        )
    ];

    leaf.style.left =
    Math.random()*100 + "vw";

    leaf.style.fontSize =
    (15 + Math.random()*25)
    + "px";

    leaf.style.animation =
    `leafFall ${
        8 + Math.random()*8
    }s linear forwards`;

    document.body.appendChild(leaf);

    setTimeout(()=>{
        leaf.remove();
    },16000);
}

setInterval(createLeaf,350);

/* Parallax Background */

const background =
document.querySelector(".background");

document.addEventListener(
"mousemove",
(e)=>{

    const x =
    (window.innerWidth/2
    - e.clientX)/50;

    const y =
    (window.innerHeight/2
    - e.clientY)/50;

    background.style.transform =
    `translate(${x}px,${y}px) scale(1.05)`;

});

</script>

</body>
</html>
